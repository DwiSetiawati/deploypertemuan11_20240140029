<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 1.75rem;
            padding-bottom: 1rem;
            border-bottom: 0.5px solid #e0dfd8;
        }

        form {
            background: #fff;
            border: 0.5px solid #dddcd5;
            border-radius: 12px;
            padding: 2rem 2.5rem;
            max-width: 400px;
            width: 100%;
        }

        form div {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 1rem;
        }

        label {
            font-size: 12px;
            color: #888780;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input {
            font-family: inherit;
            font-size: 14px;
            padding: 0.6rem 0.875rem;
            border: 0.5px solid #c0bfb8;
            border-radius: 8px;
            background: #faf9f7;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        input:focus {
            border-color: #888780;
            background: #fff;
        }

        input::placeholder {
            color: #b4b2a9;
        }

        button {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 0.65rem;
            background: #1a1a1a;
            color: #f5f4f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2c2c2a;
        }

        .login-link {
            display: block;
            text-align: center;
            font-size: 13px;
            color: #888780;
            text-decoration: none;
            margin-top: 1rem;
        }

        .login-link span {
            color: #1a1a1a;
            font-weight: 500;
        }

        .login-link:hover span {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<form th:action="@{/register}" th:object="${request}" method="post">
    <h1>Register</h1>
    <div>
        <label>Username</label>
        <input type="text" th:field="*{username}" placeholder="Username"/>
    </div>
    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="Password"/>
    </div>
    <div>
        <label>Nama</label>
        <input type="text" th:field="*{nama}" placeholder="Nama"/>
    </div>
    <div>
        <label>Alamat</label>
        <input type="text" th:field="*{alamat}" placeholder="Alamat"/>
    </div>
    <button type="submit">Register</button>
    <a th:href="@{/login}" class="login-link">Sudah punya akun? <span>Login</span></a>
</form>

</body>
</html>
